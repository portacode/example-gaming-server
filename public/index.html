<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Colyseus Test Client</title>
  <script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.14/dist/colyseus.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    #log { white-space: pre-line; background: #f4f4f4; padding: 1em; margin-top: 1em; height: 250px; overflow: auto; }
    #controls { margin-top: 1em; }
    input, button { margin: 0.2em; padding: 0.3em; }
  </style>
</head>
<body>
  <h1>Colyseus Test Client</h1>
  <div>
    Label: <input type="text" id="usernameInput" placeholder="Enter username" />
  </div>
  <div id="controls">
    <button id="connectBtn">Connect & Join Room</button>
    <button id="sendBtn" disabled>Send Message</button>
  </div>
  <div id="log"></div>

  <script>
    const log = document.getElementById('log');
    function logMsg(msg) {
      log.textContent += msg + '\n';
      log.scrollTop = log.scrollHeight;
    }

    let client;
    let room;

    // Build a WebSocket URL that matches the page's origin.
    function buildWsUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${protocol}//${location.host}`;
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      const username = document.getElementById('usernameInput').value.trim() || `Player_${Math.random().toString(36).substr(2,5)}`;
      try {
        const wsUrl = buildWsUrl();
        logMsg(`Connecting to ${wsUrl} …`);
        client = new Colyseus.Client(wsUrl);
        room = await client.joinOrCreate('game_room', { username });
        logMsg(`Joined room: ${room.roomId} as ${username}`);

        room.onStateChange(state => {
          // Uncomment if you want to see state updates
          // logMsg('State change: ' + JSON.stringify(state));
        });

        room.onMessage('waitingUpdate', data => {
          logMsg(`Waiting: ${data.waiting}/${data.max} ${data.started ? '(started)' : '(waiting)'}`);
        });

        room.onMessage('gameStart', data => {
          logMsg(`Game started: ${data.message}`);
          logMsg('Players: ' + JSON.stringify(data.players));
        });

        room.onMessage('playerMessage', data => {
          logMsg(`Player message from ${data.sessionId}: ${JSON.stringify(data.message)}`);
        });

        room.onMessage('error', data => {
          logMsg(`Error: ${data.message}`);
        });

        room.onMessage('playerLeft', data => {
          logMsg(`Player left: ${data.username} (${data.sessionId})`);
        });

        room.onMessage('playerListUpdate', data => {
          logMsg(`Current players: ${data.players.map(p => p.username).join(', ')}`);
        });

        document.getElementById('connectBtn').disabled = true;
        document.getElementById('sendBtn').disabled = false;
      } catch (e) {
        logMsg('Error: ' + e);
      }
    });

    document.getElementById('sendBtn').addEventListener('click', () => {
      if (room) {
        const msg = { hello: 'world', timestamp: Date.now() };
        room.send(msg);
        logMsg('Sent message: ' + JSON.stringify(msg));
      }
    });
  </script>
</body>
</html>
