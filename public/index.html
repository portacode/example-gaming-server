<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Colyseus Test Client</title>
  <script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.14/dist/colyseus.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    #log { white-space: pre-line; background: #f4f4f4; padding: 1em; margin-top: 1em; height: 250px; overflow: auto; }
    #controls { margin-top: 1em; }
    input, button { margin: 0.2em; padding: 0.3em; }
  </style>
</head>
<body>
  <h1>Colyseus Test Client</h1>
  <div>
    Label: <input type="text" id="usernameInput" placeholder="Enter username" />
  </div>
  <div id="controls">
    <button id="connectBtn">Connect & Join Room</button>
    <button id="pingBtn" disabled>Send Ping</button>
  </div>
  <div id="log"></div>

  <script>
    const log = document.getElementById('log');
    const connectBtn = document.getElementById('connectBtn');
    const pingBtn = document.getElementById('pingBtn');
    const usernameInput = document.getElementById('usernameInput');

    function logMsg(msg) {
      log.textContent += msg + '\n';
      log.scrollTop = log.scrollHeight;
    }

    let client;
    let room;
    let reconnectAttempts = 0;
    let latestPlayerView = null;

    function buildWsUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${protocol}//${location.host}`;
    }

    function describePlayers(players) {
      const list = [];

      players.forEach((player, sessionId) => {
        list.push(`${player.username} (${player.connected ? 'online' : 'reconnecting'}) [${sessionId.slice(0, 6)}]`);
      });

      return list.join(', ') || '(none)';
    }

    function bindRoom(nextRoom) {
      room = nextRoom;
      reconnectAttempts = 0;
      connectBtn.disabled = true;
      pingBtn.disabled = false;

      room.onStateChange((state) => {
        logMsg(`State: phase=${state.phase}, connected=${state.connectedPlayers}/${state.players.size}, players=${describePlayers(state.players)}`);
      });

      room.onMessage('playerView', (view) => {
        latestPlayerView = view;
        const visiblePlayers = view.visiblePlayers
          .map((player) => `${player.username} (${player.connected ? 'online' : 'reconnecting'})`)
          .join(', ');
        logMsg(`View: self=${view.self ? view.self.username : 'none'}, phase=${view.phase}, players=${visiblePlayers || '(none)'}`);

        if (view.lastPing) {
          logMsg(`Last ping: ${view.lastPing.username} at ${new Date(view.lastPing.at).toLocaleTimeString()}`);
        }
      });

      room.onMessage('actionError', (data) => {
        logMsg(`Action error: ${data.message}`);
      });

      room.onLeave((code) => {
        logMsg(`Disconnected from room (code ${code})`);
        pingBtn.disabled = true;

        const shouldReconnect = code !== 1000 && code !== 4001;

        if (!shouldReconnect || !room || !room.reconnectionToken || reconnectAttempts >= 3) {
          connectBtn.disabled = false;
          return;
        }

        const currentToken = room.reconnectionToken;
        reconnectAttempts += 1;

        setTimeout(async () => {
          try {
            logMsg(`Attempting reconnect ${reconnectAttempts}/3...`);
            const rejoinedRoom = await client.reconnect(currentToken);
            logMsg(`Reconnected to room ${rejoinedRoom.roomId}`);
            bindRoom(rejoinedRoom);
          } catch (error) {
            logMsg(`Reconnect failed: ${error}`);
            connectBtn.disabled = false;
          }
        }, reconnectAttempts * 1000);
      });
    }

    connectBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim() || `Player_${Math.random().toString(36).slice(2, 7)}`;

      try {
        const wsUrl = buildWsUrl();
        logMsg(`Connecting to ${wsUrl} ...`);
        client = client || new Colyseus.Client(wsUrl);
        const joinedRoom = await client.joinOrCreate('game_room', { username });
        logMsg(`Joined room: ${joinedRoom.roomId} as ${username}`);
        bindRoom(joinedRoom);
      } catch (error) {
        logMsg(`Error: ${error}`);
      }
    });

    pingBtn.addEventListener('click', () => {
      if (room) {
        room.send('action', { type: 'ping' });
        logMsg(`Sent action: ping${latestPlayerView && latestPlayerView.self ? ` as ${latestPlayerView.self.username}` : ''}`);
      }
    });
  </script>
</body>
</html>
